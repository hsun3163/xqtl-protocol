cwd: "/tmp/xqtl_test/output"
dry_run: true

pipeline_dir: "/home/user/xqtl-protocol/pipeline"
renovated_code_dir: "/home/user/xqtl-protocol/renovated_code"

start_from: "fastq"

themes:
  - name: "AC"
    fastq_list: "/tmp/xqtl_test/AC_sample_fastq.list"
    data_dir: "/tmp/xqtl_test/fastq_AC"
    paired_end: true
    phenotype_bed: ""
    covariate_file: "/tmp/xqtl_test/AC.covariates.cov.gz"
    phenotype_group: ""

genotype:
  vcf_files:
    - "/tmp/xqtl_test/genotype.vcf.gz"
  plink_bed: ""

reference:
  fasta: "/tmp/xqtl_test/ref.fasta"
  dbsnp: "/tmp/xqtl_test/dbsnp.vcf.gz"
  star_index: "/tmp/xqtl_test/STAR_Index"
  gtf_ercc: "/tmp/xqtl_test/ERCC.gtf"
  gtf_collapsed: "/tmp/xqtl_test/collapsed.gtf"
  rsem_index: "/tmp/xqtl_test/RSEM_Index"
  adapters: "TruSeq3-PE.fa"

containers:
  bioinfo: "oras://ghcr.io/statfungen/bioinfo_apptainer:latest"
  rnaquant: "oras://ghcr.io/statfungen/rnaseq_apptainer:latest"
  tensorqtl: "oras://ghcr.io/statfungen/tensorqtl_apptainer:latest"
  peer: "oras://ghcr.io/statfungen/peer_apptainer:latest"
  pcatools: "oras://ghcr.io/statfungen/pcatools_apptainer:latest"
  flashpca: "oras://ghcr.io/statfungen/flashpcaR_apptainer:latest"
  susie: "oras://ghcr.io/statfungen/stephenslab_apptainer:latest"

genotype_qc:
  mac_filter: 5
  maf_filter: 0
  geno_filter: 0.1
  mind_filter: 0.1
  hwe_filter: 1.0e-6
  kinship: 0.0625
  ld_window: 200
  ld_shift: 25
  ld_r2: 0.1

pca:
  n_pcs: 20
  pve_threshold: 0.7
  maha_k: 5
  maha_prob: 0.997

rnaseq_qc:
  low_expr_tpm: 0.1
  low_expr_tpm_percent: 0.2
  rle_filter_percent: 0.05
  ds_filter_percent: 0.05

normalization:
  method: "tmm_cpm_voom"
  tpm_threshold: 0.1
  count_threshold: 6
  sample_frac_threshold: 0.2
  quantile_normalize: true

covariate:
  n_pcs: 20
  tol_cov: 0.3
  mean_impute: true

hidden_factors:
  method: "Marchenko_PC"
  n_factors: 0
  peer_iterations: 1000
  peer_convergence: "fast"

association:
  cis_window: 1000000
  mac_threshold: 5
  maf_threshold: 0
  pvalue_cutoff: "5e-8"

finemapping:
  L: 5
  max_L: 10
  pip_cutoff: 0.025
  coverage:
    - 0.95
    - 0.70
    - 0.50
  maf: 0.0025
  rcond: 0.01

chromosomes:
  - "chr1"
  - "chr2"
  - "chr22"

resources:
  default:
    threads: 8
    mem_mb: 16000
    runtime: 720
  high_mem:
    threads: 16
    mem_mb: 60000
    runtime: 2880
  rna_calling:
    threads: 20
    mem_mb: 40000
    runtime: 1440
  genotype_qc:
    threads: 8
    mem_mb: 16000
    runtime: 1440
  pca:
    threads: 8
    mem_mb: 16000
    runtime: 720
  hidden_factors:
    threads: 8
    mem_mb: 16000
    runtime: 1440
  tensorqtl:
    threads: 8
    mem_mb: 50000
    runtime: 1440
  finemapping:
    threads: 8
    mem_mb: 32000
    runtime: 1440
