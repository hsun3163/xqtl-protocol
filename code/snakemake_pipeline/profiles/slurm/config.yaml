# ============================================================
# Snakemake SLURM cluster profile (Version 2 / native scripts)
# ============================================================
# Place this file at: profiles/slurm/config.yaml
# Use with: snakemake --profile profiles/slurm ...
#
# Adjust partition, account, and resource defaults to match
# your specific HPC cluster configuration.
# ============================================================

# Submit jobs via SLURM sbatch
executor: slurm

# Default number of jobs to run in parallel
jobs: 100

# Retry failed jobs up to 2 times before giving up
retries: 2

# Wait up to 60 seconds for output files to appear after job completes
# (accounts for NFS latency on shared filesystems)
latency-wait: 60

# Keep going with independent rules even if one fails
keep-going: false

# Rerun rules whose output files are older than their inputs (safety net)
rerun-incomplete: true

# ── Default SLURM resource settings ─────────────────────────────────────────
# These are used when a rule does not specify its own resources.
# Override per-rule via the `resources:` block in each .smk file.
default-resources:
  slurm_partition: "cpu"       # Change to your cluster's partition name
  slurm_account: ""            # Set to your HPC account/project code if required
  mem_mb: 16000                # 16 GB default memory
  runtime: 720                 # 12 hours default walltime (minutes)
  nodes: 1
  tasks: 1
  cpus_per_task: 8

# ── Resource field mapping ───────────────────────────────────────────────────
# Maps Snakemake resource names to SLURM sbatch flags.
# `runtime` in rules is specified as integer minutes (matches SLURM executor).
set-resources:
  "*":
    slurm_extra: "--output=logs/slurm/%j_{rule}.out --error=logs/slurm/%j_{rule}.err"
