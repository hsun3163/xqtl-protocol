# ============================================================
# xQTL Protocol Snakemake Pipeline Configuration
# ============================================================
# This configuration file drives the full xQTL analysis pipeline,
# from molecular phenotype calling to univariate fine-mapping.
# Pipeline mirrors the behavior of code/commands_generator/eQTL_analysis_commands.ipynb
# and code/commands_generator/bulk_expression_commands.ipynb
# ============================================================

# ------------------------------------
# Working directory for all outputs
# ------------------------------------
cwd: "/path/to/output"

# ------------------------------------
# Dry-run mode
# ------------------------------------
# When true: Snakemake builds the full DAG (use -n flag to also skip execution),
# every sos run call gets --dryrun, and every native script gets --dry-run.
# This lets you validate the full interface without touching data.
dry_run: false

# ------------------------------------
# Path to xqtl-protocol pipeline/ directory
# (contains symlinks to all SoS notebooks)
# Used by: Snakefile_sos (Version 1)
# ------------------------------------
pipeline_dir: "/path/to/xqtl-protocol/pipeline"

# ------------------------------------
# Path to renovated_code/ directory
# (contains standalone R/Python/Bash scripts)
# Used by: Snakefile_native (Version 2)
# ------------------------------------
renovated_code_dir: "/path/to/xqtl-protocol/renovated_code"

# ------------------------------------
# Starting point of the pipeline
# Options:
#   "fastq"         - start from raw FASTQ files (runs RNA calling)
#   "phenotype_bed" - start from pre-computed normalized BED.gz phenotype file
# ------------------------------------
start_from: "fastq"

# ------------------------------------
# Tissues / Themes to analyze
# Each entry defines one tissue/condition.
# ------------------------------------
themes:
  - name: "AC"
    # --- RNA-seq inputs (used only if start_from: "fastq") ---
    fastq_list: "/path/to/AC_sample_fastq.list"   # TSV: sample_id, fastq1, [fastq2]
    data_dir: "/path/to/fastq_data/AC"            # Directory containing FASTQ files
    paired_end: true                               # Whether reads are paired-end
    # --- Pre-computed phenotype (used only if start_from: "phenotype_bed") ---
    phenotype_bed: ""                              # Path to {name}.tmm_cpm_voom.expression.bed.gz
    # --- Covariates (sex, age, etc., not including genotype PCs) ---
    covariate_file: "/path/to/AC.covariates.cov.gz"
    # --- Optional: restrict to a subset of genes/regions ---
    phenotype_group: ""                            # BED file defining phenotype groups (optional)

  # Add more tissues as needed:
  # - name: "DLPFC"
  #   fastq_list: "/path/to/DLPFC_sample_fastq.list"
  #   data_dir: "/path/to/fastq_data/DLPFC"
  #   paired_end: true
  #   phenotype_bed: ""
  #   covariate_file: "/path/to/DLPFC.covariates.cov.gz"
  #   phenotype_group: ""

# ------------------------------------
# Genotype inputs
# (shared across all tissues)
# ------------------------------------
genotype:
  # VCF file(s). Provide a single VCF or a list of per-chromosome VCFs.
  # If a list, the pipeline merges them automatically.
  vcf_files:
    - "/path/to/genotype.vcf.gz"
  # Alternatively, provide an already-processed plink bed file:
  plink_bed: ""  # Leave empty to start from VCF

# ------------------------------------
# Reference Data
# ------------------------------------
reference:
  fasta: "/path/to/GRCh38_full_analysis_set_plus_decoy_hla.noALT_noHLA_noDecoy_ERCC.fasta"
  dbsnp: "/path/to/dbSNP155.vcf.gz"
  # STAR genome index (required for RNA calling)
  star_index: "/path/to/STAR_Index"
  # Gene annotation GTF files
  gtf_ercc: "/path/to/Homo_sapiens.GRCh38.103.chr.reformatted.ERCC.gtf"
  gtf_collapsed: "/path/to/Homo_sapiens.GRCh38.103.chr.reformatted.collapse_only.gene.ERCC.gtf"
  # RSEM index directory (for transcript-level quantification)
  rsem_index: "/path/to/RSEM_Index"
  # Adapter sequences for trimming (detected from FastQC if not specified)
  adapters: "TruSeq3-PE.fa"

# ------------------------------------
# Containers (Singularity/Apptainer images)
# ------------------------------------
containers:
  bioinfo: "oras://ghcr.io/statfungen/bioinfo_apptainer:latest"
  rnaquant: "oras://ghcr.io/statfungen/rnaseq_apptainer:latest"
  tensorqtl: "oras://ghcr.io/statfungen/tensorqtl_apptainer:latest"
  peer: "oras://ghcr.io/statfungen/peer_apptainer:latest"
  pcatools: "oras://ghcr.io/statfungen/pcatools_apptainer:latest"
  flashpca: "oras://ghcr.io/statfungen/flashpcaR_apptainer:latest"
  susie: "oras://ghcr.io/statfungen/stephenslab_apptainer:latest"

# ------------------------------------
# Genotype QC Parameters
# ------------------------------------
genotype_qc:
  mac_filter: 5         # Minimum minor allele count
  maf_filter: 0         # Minimum minor allele frequency (0 = no filter)
  geno_filter: 0.1      # Maximum per-variant missingness
  mind_filter: 0.1      # Maximum per-sample missingness
  hwe_filter: 1.0e-6    # Hardy-Weinberg equilibrium p-value cutoff
  kinship: 0.0625       # Kinship coefficient for relatedness (3rd degree)
  ld_window: 200        # LD pruning window (variants)
  ld_shift: 25          # LD pruning step size
  ld_r2: 0.1            # LD pruning r² threshold

# ------------------------------------
# PCA Parameters
# ------------------------------------
pca:
  n_pcs: 20             # Number of PCs to compute
  pve_threshold: 0.7    # Proportion of variance explained threshold for PC selection
  maha_k: 5             # PCs used for Mahalanobis outlier detection
  maha_prob: 0.997      # Probability threshold for outlier detection

# ------------------------------------
# RNA-seq QC Parameters
# ------------------------------------
rnaseq_qc:
  low_expr_tpm: 0.1         # Minimum TPM for expression
  low_expr_tpm_percent: 0.2 # Fraction of samples meeting TPM threshold
  rle_filter_percent: 0.05  # RLE outlier detection percentile
  ds_filter_percent: 0.05   # D-statistic outlier detection percentile

# ------------------------------------
# Expression Normalization Parameters
# ------------------------------------
normalization:
  method: "tmm_cpm_voom"    # Normalization method: tmm_cpm_voom, tmm, or log2cpm
  tpm_threshold: 0.1        # TPM filter threshold
  count_threshold: 6        # Read count filter threshold
  sample_frac_threshold: 0.2 # Fraction of samples with expression above threshold
  quantile_normalize: true  # Apply quantile normalization after TMM

# ------------------------------------
# Covariate Processing Parameters
# ------------------------------------
covariate:
  n_pcs: 20           # Number of genotype PCs to include in covariates
  tol_cov: 0.3        # Collinearity tolerance (proportion of missing covariates)
  mean_impute: true   # Mean-impute missing covariate values

# ------------------------------------
# Hidden Factor Analysis Parameters
# ------------------------------------
hidden_factors:
  method: "Marchenko_PC"  # Method: "Marchenko_PC" or "PEER"
  n_factors: 0            # Number of factors (0 = auto-determine)
  # PEER-specific parameters (only used when method: "PEER")
  peer_iterations: 1000
  peer_convergence: "fast"  # "fast", "medium", or "slow"

# ------------------------------------
# Association Testing Parameters
# ------------------------------------
association:
  cis_window: 1000000   # CIS window in bp (default: 1 Mb)
  mac_threshold: 5      # Minimum allele count for association testing
  maf_threshold: 0      # Minimum MAF for association testing (0 = no filter)
  pvalue_cutoff: "5e-8" # Genome-wide significance threshold

# ------------------------------------
# Univariate Fine-mapping Parameters
# ------------------------------------
finemapping:
  L: 5              # Expected number of causal effects (SuSiE L parameter)
  max_L: 10         # Maximum number of effects
  pip_cutoff: 0.025 # PIP threshold for reporting
  coverage:         # Credible set coverage levels
    - 0.95
    - 0.70
    - 0.50
  maf: 0.0025       # MAF filter for fine-mapping
  rcond: 0.01       # LD matrix regularization (rcond for pseudoinverse)

# ------------------------------------
# Chromosomes to analyze
# ------------------------------------
chromosomes:
  - "chr1"
  - "chr2"
  - "chr3"
  - "chr4"
  - "chr5"
  - "chr6"
  - "chr7"
  - "chr8"
  - "chr9"
  - "chr10"
  - "chr11"
  - "chr12"
  - "chr13"
  - "chr14"
  - "chr15"
  - "chr16"
  - "chr17"
  - "chr18"
  - "chr19"
  - "chr20"
  - "chr21"
  - "chr22"

# ------------------------------------
# Compute Resources
# ------------------------------------
resources:
  default:
    threads: 8
    mem_mb: 16000    # 16 GB
    runtime: 720     # 12 h in minutes
  high_mem:
    threads: 16
    mem_mb: 60000    # 60 GB
    runtime: 2880    # 48 h in minutes
  rna_calling:
    threads: 20
    mem_mb: 40000    # 40 GB
    runtime: 1440    # 24 h in minutes
  genotype_qc:
    threads: 8
    mem_mb: 16000
    runtime: 1440    # 24 h in minutes
  pca:
    threads: 8
    mem_mb: 16000
    runtime: 720     # 12 h in minutes
  hidden_factors:
    threads: 8
    mem_mb: 16000
    runtime: 1440    # 24 h in minutes
  tensorqtl:
    threads: 8
    mem_mb: 50000    # 50 GB
    runtime: 1440    # 24 h in minutes
  finemapping:
    threads: 8
    mem_mb: 32000    # 32 GB
    runtime: 1440    # 24 h in minutes
